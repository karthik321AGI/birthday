<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <audio id="bgm" src="Darling.mp3" loop></audio>

    <img src="ZUiY.gif" alt="stars" class="star">
    <img src="5l03.gif" alt="ballon" class="ballon">
    <div class="container">
        <div class="birthdayCard">
            <div class="cardFront">
                <div class="front-text">
                    <h3 class="happy">Kodthe</h3>
                    <h2 class="bday">Pallu</h2>
                    <h3 class="toyou">పారిపోతాయి...!</h3>
                </div>
                <div class="wrap-deco">
                    <div class="decorations"></div>
                    <div class="decorationsTwo"></div>
                </div>
                <div class="wrap-decoTwo">
                    <div class="decorations"></div>
                    <div class="decorationsThree"></div>
                </div>
                <div class="plate">
                    <div class="cake"></div>
                    <div class="flame"></div>
                </div>
            </div>
            <div class="cardInside">
                <div class="img">
                    <img src="penguin.jpg" alt="Brotherpic" class="bdyboy">
                    <img src="6ob.gif" alt="confetti" class="confetti">
                </div>
                <div class="inside-text">
                    <h3 class="happy">HAPPY</h3>
                    <h2 class="bday">BIRTHDAY</h2>
                    <h3 class="toyou">Staaruuu🥳!</h3>
                </div>
                <div class="wishes">
                    <p>Oyy Staarruuu 😀!!!!,</p>
                    <p>Sometimes iam afraid that your cute voice is grabing people's attention away from me. Now that u r one year older, I wish ur voice won't be sweeter anymore. Happy birthday!!😜😛!
                    </p>
                    <p class="name"> @Karthik</p>
                </div>
            </div>
        </div>
    </div>

    <img src="4SHX.gif" alt="cat" class="cat">

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const audio = document.getElementById('bgm');
            let isPlaying = false;

            document.addEventListener('click', function() {
                if (!isPlaying) {
                    audio.play();
                    isPlaying = true;
                }
            });
        });
    </script>
</body>

</html>
